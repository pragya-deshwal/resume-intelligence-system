<!DOCTYPE html>
<html>
<head>
    <title>Resume Matcher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: linear-gradient(135deg, #ffe4e6, #e0f2fe, #fef3c7);
        color: #1f2937;
        font-family: 'Segoe UI';
    }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="text-start mb-3">
        <a href="/" class="btn btn-light btn-sm">⬅ Back to Login</a>
    </div>

    <div class="text-center mb-4">
        <h1>Resume - JD Matcher</h1>
    </div>

    <div class="card p-4 text-dark">

        <form action="/analyze" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Upload Resumes (Multiple)</label>
                <input type="file" name="resume" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Job Description</label>
                <textarea name="jd" class="form-control" rows="6" required></textarea>
            </div>

            <button class="btn btn-primary">Analyze</button>

        </form>

    </div>

</div>

</body>
</html>
