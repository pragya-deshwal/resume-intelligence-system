<!DOCTYPE html>
<html>
<head>
    <title>Login | Resume Intelligence System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #ffe4e6, #e0f2fe, #fef3c7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            display: flex;
            width: 850px;
            height: 500px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* LEFT SIDE (Branding) */
        .left-panel {
            width: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: #1f2937;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h1 {
            font-size: 28px;
            font-weight: bold;
        }

        .left-panel p {
            margin-top: 15px;
            opacity: 0.9;
        }

        /* RIGHT SIDE (Form) */
        .right-panel {
            width: 50%;
            background: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-title {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .toggle-link {
            cursor: pointer;
            color: #667eea;
            font-weight: 500;
        }

        .input-group button {
            border: none;
            background: #eee;
        }
    </style>
</head>

<body>

<div class="main-container">

    <!-- 🔵 LEFT PANEL -->
    <div class="left-panel">
        <h1>Resume Intelligence System</h1>
        <p>
            Analyze your resume against job descriptions using AI.
            Get match scores, ATS insights, skill gaps, and smart rewrite suggestions.
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <h4 id="formTitle" class="form-title">Sign In</h4>

        <!-- SIGN IN -->
        <form id="signinForm" action="/signin" method="post">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-3">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                <button type="button" onclick="togglePassword()">👁</button>
            </div>

            <button class="btn btn-primary w-100">Sign In</button>

            <p class="mt-3 text-center">
                New user? 
                <span class="toggle-link" onclick="switchToSignup()">Sign Up</span>
            </p>
        </form>

        <!-- SIGN UP -->
        <form id="signupForm" action="/signup" method="post" style="display:none;">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-3">
                <input type="password" id="password2" name="password" class="form-control" placeholder="Password" required>
                <button type="button" onclick="togglePassword2()">👁</button>
            </div>

            <button class="btn btn-success w-100">Sign Up</button>

            <p class="mt-3 text-center">
                Already have an account? 
                <span class="toggle-link" onclick="switchToSignin()">Sign In</span>
            </p>
        </form>

    </div>

</div>

<script>
function switchToSignup() {
    document.getElementById("signinForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
    document.getElementById("formTitle").innerText = "Sign Up";
}

function switchToSignin() {
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("signinForm").style.display = "block";
    document.getElementById("formTitle").innerText = "Sign In";
}

function togglePassword() {
    let p = document.getElementById("password");
    p.type = (p.type === "password") ? "text" : "password";
}

function togglePassword2() {
    let p = document.getElementById("password2");
    p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
